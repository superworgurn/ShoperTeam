<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/shoperteam.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Shoper Team</title>
    <meta name="description" content="ทำความรู้จักกับ Shoper Team แหล่งรวมผลงานและวิดีโอสร้างสรรค์ เพราะเมื่อเรารวมกัน ทุกอย่างก็เป็นไปได้" />
    <meta name="keywords" content="Shoper Team, Watermelon, Shoper Mini, Shoper Copyright, Shoper Gamer, Chairfkub, Nature, Animexo, Shoper Cat" />
    <meta name="author" content="Shoper Team" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#3b82f6" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://shoperteam.vercel.app/" />
    <meta property="og:title" content="Shoper Team" />
    <meta property="og:description" content="ทำความรู้จักกับ Shoper Team แหล่งรวมผลงานและวิดีโอสร้างสรรค์ เพราะเมื่อเรารวมกัน ทุกอย่างก็เป็นไปได้" />
    <meta property="og:image" content="/shoperteam.webp" />

    <style>
      /* Loading Screen Styles */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
      }
      
      .loading-logo {
        width: 100px;
        height: 100px;
        margin-bottom: 20px;
        border-radius: 50%;
        background-color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        animation: pulse 1.5s infinite alternate;
      }
      
      .loading-logo img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        object-fit: cover;
      }
      
      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      
      .loading-text {
        color: white;
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 8px;
        letter-spacing: 0.5px;
      }
      
      .loading-subtext {
        color: rgba(255, 255, 255, 0.85);
        font-size: 1rem;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        from { transform: scale(1); }
        to { transform: scale(1.05); }
      }
      
      /* Hide when loaded */
      .loaded #loading-screen {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div class="loading-logo">
        <img src="/shoperteam.webp" alt="Shoper Team Logo" onerror="this.style.display='none'">
      </div>
      <div class="loading-spinner"></div>
      <div class="loading-text">Shoper Team</div>
      <div class="loading-subtext">กำลังเตรียมพร้อม...</div>
    </div>
    
    <div id="root"></div>
    <script async type="module" src="/src/main.tsx"></script>
    
    <script>
      // รอให้โหลดทรัพยากรหลักเสร็จจริงๆ ค่อยเอา Loading ออก (เร็วกว่าการตั้งเวลา 3 วิ)
      window.addEventListener('load', function() {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          // หน่วงเวลาเล็กน้อยเพื่อให้ React Render หน้าแรกเสร็จ
          setTimeout(() => {
            document.body.classList.add('loaded');
          }, 300);
        }
      });
      // Fallback เผื่อเกิดข้อผิดพลาดในการโหลด
      setTimeout(function() {
        document.body.classList.add('loaded');
      }, 5000); 
    </script>
  </body>
</html>
